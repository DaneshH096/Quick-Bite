# ==============================
# LOCAL (Eclipse + MySQL)
# ==============================
spring.application.name=food-delivery-app

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/food_delivery_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=foodapp
spring.datasource.password=foodapp123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.jackson.serialization.fail-on-empty-beans=false


# Server
server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.fooddelivery=DEBUG

spring.mvc.throw-exception-if-no-handler-found=true
# spring.web.resources.add-mappings=false 

# Custom error pages path
server.error.whitelabel.enabled=false
server.error.include-message=never
server.error.include-exception=false

# ==============================
# Email (forgot-password reset link) — via Resend's HTTPS API
# ==============================
# Railway (and most cloud hosts) block outbound SMTP entirely on free/hobby
# plans to prevent abuse — see https://docs.railway.com/networking/outbound-networking.
# Resend sends mail over a normal HTTPS POST instead of raw SMTP, so it works
# on every plan/host without any port restrictions.
#
# Setup:
#   1. Sign up free at https://resend.com and grab an API key (starts with re_)
#      from https://resend.com/api-keys
#   2. Set it as an environment variable before running the app:
#        export RESEND_API_KEY=re_your_key_here
#   3. Until you verify your own domain at https://resend.com/domains, Resend
#      only lets you send FROM onboarding@resend.dev, and only TO the email
#      address your Resend account itself is registered with. That's enough
#      to fully test the reset-password flow using your own inbox. Once you
#      verify a domain, switch app.mail.from below to an address on it and
#      you can email any user.
resend.api-key=${RESEND_API_KEY:}
app.mail.from=${MAIL_FROM:onboarding@resend.dev}
# Public base URL used to build the reset link inside the email
# (change this to your real deployed URL, e.g. https://myapp.up.railway.app)
app.base-url=${APP_BASE_URL:http://localhost:8080}

