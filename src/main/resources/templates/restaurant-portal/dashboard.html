<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard – Restaurant Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/css/admin.css"/>
  <style>
    .rp-toggle { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.08);
      padding:8px 14px; border-radius:10px; cursor:pointer; user-select:none; }
    .rp-toggle-label { font-size:.85rem; font-weight:600; color:rgba(255,255,255,.85); }
    .rp-switch { width:40px; height:22px; border-radius:11px; background:#555; position:relative;
      transition:.25s; }
    .rp-switch.on { background:#4caf50; }
    .rp-switch::after { content:''; position:absolute; top:3px; left:3px; width:16px; height:16px;
      border-radius:50%; background:#fff; transition:.25s; }
    .rp-switch.on::after { left:21px; }
  </style>
</head>
<body class="admin-body">

<nav class="admin-nav">
  <a class="nav-brand" href="/restaurant-portal">Quick<span>Bite</span> Owner</a>
  <div class="nav-links" style="display:flex;align-items:center;gap:6px;">
    <a href="/restaurant-portal" class="active">Dashboard</a>
    <a href="/restaurant-portal/orders">Orders</a>
    <a href="/restaurant-portal/menu">Menu</a>
    <a href="/restaurant-portal/profile">Profile</a>
    <div class="rp-toggle" id="openToggle" onclick="toggleOpen()">
      <span class="rp-toggle-label" id="openLabel">Open</span>
      <div class="rp-switch on" id="openSwitch"></div>
    </div>
    <form method="post" action="/logout" style="display:inline">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}"/>
      <button type="submit" class="btn-logout">Sign Out</button>
    </form>
  </div>
</nav>

<main class="admin-main">
  <h1 class="admin-title">
    <span th:text="${restaurant.name}">Restaurant</span>
    <span style="font-size:.9rem;color:#aaa;font-weight:400;margin-left:8px;"
          th:text="'Welcome, ' + ${user.name}"></span>
  </h1>

  <div class="stats-grid">
    <div class="stat-card orange">
      <div class="stat-icon">📦</div>
      <div class="stat-val" th:text="${totalOrders}">0</div>
      <div class="stat-label">Total Orders</div>
    </div>
    <div class="stat-card red">
      <div class="stat-icon">⏳</div>
      <div class="stat-val" th:text="${pendingCount}">0</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-icon">👨‍🍳</div>
      <div class="stat-val" th:text="${activeCount}">0</div>
      <div class="stat-label">In Kitchen</div>
    </div>
    <div class="stat-card green">
      <div class="stat-icon">🍽</div>
      <div class="stat-val" th:text="${menuCount}">0</div>
      <div class="stat-label">Menu Items</div>
    </div>
  </div>

  <div class="admin-card">
    <div class="admin-card-header">
      <h2>Recent Orders</h2>
      <a href="/restaurant-portal/orders" class="btn-sm blue">View All →</a>
    </div>
    <div class="table-wrap">
      <table class="admin-table">
        <thead><tr><th>#</th><th>Customer</th><th>Items</th><th>Amount</th><th>Status</th></tr></thead>
        <tbody>
          <tr th:each="o : ${recentOrders}">
            <td th:text="'#' + ${o.id}"></td>
            <td th:text="${o.user.name}"></td>
            <td><span th:each="oi,iter : ${o.orderItems}">
                  <span th:text="${oi.menuItem.name + ' ×' + oi.quantity}"></span><span th:if="${!iter.last}">, </span>
                </span></td>
            <td>₹<span th:text="${o.totalAmount}"></span></td>
            <td><span class="status-badge" th:classappend="${#strings.toLowerCase(o.status.name())}"
                      th:text="${o.status}"></span></td>
          </tr>
          <tr th:if="${#lists.isEmpty(recentOrders)}">
            <td colspan="5" style="text-align:center;color:#aaa;padding:32px;">No orders yet</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script th:inline="javascript">
/*<![CDATA[*/
let isOpen = /*[[${restaurant.isOpen}]]*/ true;

function paintToggle() {
  document.getElementById('openSwitch').classList.toggle('on', isOpen);
  document.getElementById('openLabel').textContent = isOpen ? 'Open' : 'Closed';
}
paintToggle();

function toggleOpen() {
  isOpen = !isOpen;
  paintToggle();
  fetch('/restaurant-portal/toggle-open', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ open: isOpen })
  })
  .then(r => r.json())
  .then(data => {
    if (!data.success) { isOpen = !isOpen; paintToggle(); alert('Failed: ' + (data.message || 'unknown error')); }
  })
  .catch(() => { isOpen = !isOpen; paintToggle(); alert('Network error — try again'); });
}
/*]]>*/
</script>

</body>
</html>
