<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile – Restaurant Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/css/admin.css"/>
</head>
<body class="admin-body">

<nav class="admin-nav">
  <a class="nav-brand" href="/restaurant-portal">Quick<span>Bite</span> Owner</a>
  <div class="nav-links">
    <a href="/restaurant-portal">Dashboard</a>
    <a href="/restaurant-portal/orders">Orders</a>
    <a href="/restaurant-portal/menu">Menu</a>
    <a href="/restaurant-portal/profile" class="active">Profile</a>
    <form method="post" action="/logout" style="display:inline">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}"/>
      <button type="submit" class="btn-logout">Sign Out</button>
    </form>
  </div>
</nav>

<main class="admin-main" style="max-width:760px;">
  <h1 class="admin-title">Restaurant Profile</h1>

  <div th:if="${param.updated}" style="background:#e8f5e9;color:#2e7d32;padding:12px 16px;
       border-radius:10px;margin-bottom:20px;font-size:.92rem;">✅ Profile updated.</div>

  <div class="admin-card" style="padding:28px;">
    <div th:if="${restaurant.imageUrl}" style="margin-bottom:20px;">
      <img th:src="${restaurant.imageUrl}" alt="Restaurant photo"
           style="width:100%;max-height:220px;object-fit:cover;border-radius:12px;"/>
    </div>

    <form method="post" action="/restaurant-portal/profile/save" enctype="multipart/form-data">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}"/>

      <div class="form-group">
        <label>Restaurant Name *</label>
        <input type="text" name="name" th:value="${restaurant.name}" required/>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="3" th:text="${restaurant.description}"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Cuisine Type</label>
          <input type="text" name="cuisineType" th:value="${restaurant.cuisineType}"/>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" name="phone" th:value="${restaurant.phone}"/>
        </div>
      </div>
      <div class="form-group">
        <label>Address</label>
        <textarea name="address" rows="2" th:text="${restaurant.address}"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Delivery Time (minutes)</label>
          <input type="number" name="deliveryTimeMinutes" th:value="${restaurant.deliveryTimeMinutes}"/>
        </div>
        <div class="form-group">
          <label>Minimum Order Amount (₹)</label>
          <input type="number" step="0.01" name="minOrderAmount" th:value="${restaurant.minOrderAmount}"/>
        </div>
      </div>
      <div class="form-group">
        <label>Restaurant Photo</label>
        <input type="file" name="photo" accept="image/*"/>
      </div>
      <div class="form-group">
        <label>...or Image URL (used if no photo uploaded)</label>
        <input type="text" name="imageUrl" placeholder="https://..."/>
      </div>

      <button type="submit" class="btn-red" style="width:100%;">Save Changes</button>
    </form>
  </div>
</main>

</body>
</html>
