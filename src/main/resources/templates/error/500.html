<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Something Went Wrong – QuickBite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;
      justify-content:center;background:radial-gradient(ellipse at 50% 50%,#fff8e1,#fce4ec 70%);}
    .card{background:#fff;border-radius:28px;padding:56px 48px;max-width:480px;width:100%;
      text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.10);}
    .emoji{font-size:4rem;margin-bottom:16px;display:block;}
    .code{font-family:'Syne',sans-serif;font-size:5rem;font-weight:800;color:#f5f5f5;line-height:1;margin-bottom:-8px;}
    h1{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:#1a1a2e;margin-bottom:12px;}
    p{color:#888;font-size:.95rem;line-height:1.6;margin-bottom:28px;}
    .detail-box{background:#fff8f8;border:1px solid #ffcdd2;border-radius:10px;
      padding:12px 16px;font-size:.8rem;color:#c62828;text-align:left;margin-bottom:24px;
      font-family:monospace;word-break:break-word;display:none;}
    .detail-box.visible{display:block;}
    .toggle-link{font-size:.8rem;color:#bbb;cursor:pointer;text-decoration:underline;
      margin-bottom:20px;display:inline-block;}
    .toggle-link:hover{color:#e53935;}
    .btn{display:inline-block;padding:13px 28px;background:linear-gradient(135deg,#e53935,#ff7043);
      color:#fff;border-radius:12px;text-decoration:none;font-weight:700;font-size:.95rem;
      transition:.2s;margin:4px;}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(229,57,53,.3);}
    .btn-ghost{background:none;border:2px solid #eee;color:#555;}
    .btn-ghost:hover{border-color:#e53935;color:#e53935;transform:none;box-shadow:none;}
  </style>
</head>
<body>
<div class="card">
  <span class="emoji">⚙️</span>
  <div class="code">500</div>
  <h1>Something Went Wrong</h1>
  <p>Our kitchen hit a snag! This is a server-side error.<br/>
     Your order data is safe — please try again in a moment.</p>

  <!-- Show technical detail only if available (dev mode) -->
  <div th:if="${errorMessage != null}">
    <span class="toggle-link" onclick="this.nextElementSibling.classList.toggle('visible')">
      Show technical details ↓
    </span>
    <div class="detail-box" th:text="${errorMessage}">Error details here</div>
  </div>

  <a href="/home" class="btn">🏠 Go Home</a>
  <a href="javascript:location.reload()" class="btn btn-ghost">🔄 Try Again</a>
</div>
</body>
</html>
