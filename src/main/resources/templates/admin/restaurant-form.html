<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restaurant Form – Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/css/admin.css"/>
</head>
<body class="admin-body">

<nav class="admin-nav">
  <a class="nav-brand" href="/admin">Quick<span>Bite</span> Admin</a>
  <div class="nav-links">
    <a href="/admin">Dashboard</a>
    <a href="/admin/restaurants" class="active">Restaurants</a>
    <a href="/admin/orders">Orders</a>
  </div>
</nav>

<main class="admin-main" style="max-width:700px;">
  <h1 class="admin-title" th:text="${restaurant != null ? 'Edit Restaurant' : 'Add Restaurant'}">Restaurant</h1>

  <div class="admin-card" style="padding:32px;">
    <form method="post" action="/admin/restaurants/save">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}"/>
      <input type="hidden" name="id" th:value="${restaurant?.id}" th:if="${restaurant != null}"/>

      <div class="form-row">
        <div class="form-group">
          <label>Restaurant Name *</label>
          <input type="text" name="name" th:value="${restaurant?.name}" required/>
        </div>
        <div class="form-group">
          <label>Cuisine Type *</label>
          <input type="text" name="cuisineType" th:value="${restaurant?.cuisineType}" placeholder="e.g. South Indian" required/>
        </div>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="2" th:text="${restaurant?.description}"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>
          <input type="text" name="phone" th:value="${restaurant?.phone}"/>
        </div>
        <div class="form-group">
          <label>Delivery Time (min) *</label>
          <input type="number" name="deliveryTimeMinutes" th:value="${restaurant?.deliveryTimeMinutes ?: 30}" required/>
        </div>
      </div>

      <div class="form-group">
        <label>Address</label>
        <textarea name="address" rows="2" th:text="${restaurant?.address}"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Image URL</label>
          <input type="text" name="imageUrl" th:value="${restaurant?.imageUrl}" placeholder="https://..."/>
        </div>
        <div class="form-group">
          <label>Minimum Order (₹) *</label>
          <input type="number" name="minOrderAmount" th:value="${restaurant?.minOrderAmount ?: 0}" step="0.01" required/>
        </div>
      </div>

      <div style="display:flex;gap:12px;margin-top:8px;">
        <button type="submit" class="btn-red">Save Restaurant</button>
        <a href="/admin/restaurants" class="btn-sm" style="padding:12px 24px;">Cancel</a>
      </div>
    </form>
  </div>
</main>

</body>
</html>
