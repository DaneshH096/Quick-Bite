<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menu – Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/css/admin.css"/>
</head>
<body class="admin-body">

<nav class="admin-nav">
  <a class="nav-brand" href="/admin">Quick<span>Bite</span> Admin</a>
  <div class="nav-links">
    <a href="/admin">Dashboard</a>
    <a href="/admin/restaurants" class="active">Restaurants</a>
    <a href="/admin/orders">Orders</a>
  </div>
</nav>

<main class="admin-main">
  <h1 class="admin-title">
    Menu – <span th:text="${restaurant.name}"></span>
  </h1>

  <div style="display:grid;grid-template-columns:1fr 380px;gap:32px;align-items:start;">

    <!-- Menu Items Table -->
    <div class="admin-card">
      <div class="table-wrap">
        <table class="admin-table">
          <thead>
            <tr><th>Item</th><th>Category</th><th>Price</th><th>Veg</th><th>Actions</th></tr>
          </thead>
          <tbody>
            <tr th:each="item : ${menuItems}">
              <td><strong th:text="${item.name}"></strong><br/>
                  <small style="color:#aaa;" th:text="${item.description}"></small></td>
              <td th:text="${item.category}"></td>
              <td>₹<span th:text="${item.price}"></span></td>
              <td th:text="${item.isVegetarian ? '🟢' : '🔴'}"></td>
              <td>
                <a th:href="@{/admin/menu/delete/{itemId}/{restaurantId}(itemId=${item.id},restaurantId=${restaurant.id})}"
                   class="btn-sm red" onclick="return confirm('Delete item?')">Delete</a>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(menuItems)}">
              <td colspan="5" style="text-align:center;color:#aaa;padding:32px;">No items yet</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Add Item Form -->
    <div class="admin-card" style="padding:24px;">
      <h3 style="margin-bottom:20px;">+ Add Menu Item</h3>
      <form method="post" action="/admin/menu/save">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}"/>
        <input type="hidden" name="restaurantId" th:value="${restaurant.id}"/>
        <div class="form-group">
          <label>Item Name *</label>
          <input type="text" name="name" required/>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea name="description" rows="2"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Price (₹) *</label>
            <input type="number" name="price" step="0.01" required/>
          </div>
          <div class="form-group">
            <label>Category</label>
            <input type="text" name="category" placeholder="e.g. Starters"/>
          </div>
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="text" name="imageUrl"/>
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:8px;">
          <input type="checkbox" name="isVegetarian" id="isVeg" style="width:auto"/>
          <label for="isVeg" style="text-transform:none;letter-spacing:0;font-size:.95rem;">Vegetarian</label>
        </div>
        <button type="submit" class="btn-red" style="width:100%;">Add Item</button>
      </form>
    </div>
  </div>
</main>

</body>
</html>
