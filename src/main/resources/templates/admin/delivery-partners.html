<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Delivery Partners – Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/css/admin.css"/>
</head>
<body class="admin-body">

<nav class="admin-nav">
  <a class="nav-brand" href="/admin">Quick<span>Bite</span> Admin</a>
  <div class="nav-links">
    <a href="/admin">Dashboard</a>
    <a href="/admin/orders">Orders</a>
    <a href="/admin/delivery-partners" class="active">Partners</a>
    <a href="/admin/map">Live Map</a>
    <form method="post" action="/logout" style="display:inline">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}"/>
      <button type="submit" class="btn-logout">Sign Out</button>
    </form>
  </div>
</nav>

<main class="admin-main">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
    <h1 class="admin-title" style="margin:0;">Delivery Partners</h1>
    <button onclick="document.getElementById('addModal').style.display='flex'"
            class="btn-red">+ Add Partner</button>
  </div>

  <div th:if="${param.added}" style="background:#e8f5e9;color:#2e7d32;padding:12px 16px;
    border-radius:10px;margin-bottom:20px;font-weight:600;">
    ✅ Delivery partner added successfully!
  </div>

  <!-- Partners grid -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;">
    <div th:each="p : ${partners}" class="admin-card" style="padding:20px;">
      <!-- Avatar + name -->
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;">
        <div style="width:48px;height:48px;border-radius:50%;
          background:linear-gradient(135deg,#1565c0,#42a5f5);
          color:#fff;font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;
          display:flex;align-items:center;justify-content:center;"
             th:text="${#strings.substring(p.name,0,1)}">R</div>
        <div>
          <div style="font-weight:700;font-size:1rem;" th:text="${p.name}"></div>
          <div style="font-size:.82rem;color:#aaa;" th:text="${p.email}"></div>
        </div>
        <!-- availability badge -->
        <span th:if="${p.isAvailable}"
              style="margin-left:auto;background:#e8f5e9;color:#2e7d32;
                     padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:700;">
          🟢 Online
        </span>
        <span th:unless="${p.isAvailable}"
              style="margin-left:auto;background:#fff3e0;color:#e65100;
                     padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:700;">
          🟡 On run
        </span>
      </div>
      <!-- Details -->
      <div style="font-size:.85rem;display:flex;flex-direction:column;gap:6px;">
        <div style="display:flex;justify-content:space-between;">
          <span style="color:#aaa;">Phone</span>
          <span th:text="${p.phone ?: '—'}"></span>
        </div>
        <div style="display:flex;justify-content:space-between;">
          <span style="color:#aaa;">Vehicle</span>
          <span th:text="${p.vehicleType ?: '—'}"></span>
        </div>
        <div style="display:flex;justify-content:space-between;">
          <span style="color:#aaa;">GPS</span>
          <span th:if="${p.currentLat != null}"
                style="color:#2e7d32;font-weight:600;">📍 Live</span>
          <span th:unless="${p.currentLat != null}"
                style="color:#ccc;">No location</span>
        </div>
      </div>
    </div>

    <div th:if="${#lists.isEmpty(partners)}"
         style="grid-column:1/-1;text-align:center;color:#ccc;padding:48px;">
      No delivery partners yet. Add one above.
    </div>
  </div>
</main>

<!-- Add Partner Modal -->
<div id="addModal" style="display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:20px;padding:32px 28px;
    width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2);">
    <h2 style="font-family:'Syne',sans-serif;font-size:1.3rem;margin-bottom:20px;">
      Add Delivery Partner
    </h2>
    <form method="post" action="/admin/delivery-partners/add">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}"/>
      <div class="form-group"><label>Full Name *</label>
        <input type="text" name="name" required/></div>
      <div class="form-group"><label>Email *</label>
        <input type="email" name="email" required/></div>
      <div class="form-group"><label>Password *</label>
        <input type="password" name="password" required minlength="6"/></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group"><label>Phone</label>
          <input type="tel" name="phone"/></div>
        <div class="form-group"><label>Vehicle Type</label>
          <select name="vehicleType" style="width:100%;padding:11px 12px;
            border:2px solid #eee;border-radius:10px;font-family:'DM Sans',sans-serif;
            font-size:.95rem;outline:none;">
            <option value="Bike">Bike</option>
            <option value="Scooter">Scooter</option>
            <option value="Car">Car</option>
            <option value="Cycle">Cycle</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px;">
        <button type="submit" class="btn-red" style="flex:1;">Add Partner</button>
        <button type="button" style="flex:1;padding:12px;border:2px solid #eee;
          border-radius:10px;background:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;
          font-weight:600;"
          onclick="document.getElementById('addModal').style.display='none'">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
// Close modal on backdrop click
document.getElementById('addModal').addEventListener('click', function(e) {
  if (e.target === this) this.style.display = 'none';
});
</script>
</body>
</html>
