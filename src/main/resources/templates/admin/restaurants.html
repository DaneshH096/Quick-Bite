<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restaurants – Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/css/admin.css"/>
</head>
<body class="admin-body">

<nav class="admin-nav">
  <a class="nav-brand" href="/admin">Quick<span>Bite</span> Admin</a>
  <div class="nav-links">
    <a href="/admin">Dashboard</a>
    <a href="/admin/restaurants" class="active">Restaurants</a>
    <a href="/admin/orders">Orders</a>
    <form method="post" action="/logout" style="display:inline">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}"/>
      <button type="submit" class="btn-logout">Sign Out</button>
    </form>
  </div>
</nav>

<main class="admin-main">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;">
    <h1 class="admin-title" style="margin:0;">Restaurants</h1>
    <a href="/admin/restaurants/add" class="btn-red">+ Add Restaurant</a>
  </div>

  <div class="admin-card">
    <div class="table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>#</th><th>Name</th><th>Cuisine</th><th>Rating</th><th>Delivery</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="r : ${restaurants}">
            <td th:text="${r.id}"></td>
            <td><strong th:text="${r.name}"></strong></td>
            <td th:text="${r.cuisineType}"></td>
            <td>⭐ <span th:text="${r.rating}"></span></td>
            <td th:text="${r.deliveryTimeMinutes} + ' min'"></td>
            <td>
              <span th:if="${r.isActive}" style="color:#4caf50;font-weight:600;">● Active</span>
              <span th:unless="${r.isActive}" style="color:#f44336;font-weight:600;">● Inactive</span>
            </td>
            <td class="action-btns">
              <a th:href="@{/admin/restaurants/{id}/menu(id=${r.id})}" class="btn-sm">Menu</a>
              <a th:href="@{/admin/restaurants/edit/{id}(id=${r.id})}" class="btn-sm blue">Edit</a>
              <a th:href="@{/admin/restaurants/delete/{id}(id=${r.id})}" class="btn-sm red"
                 onclick="return confirm('Delete this restaurant?')">Delete</a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

</body>
</html>
