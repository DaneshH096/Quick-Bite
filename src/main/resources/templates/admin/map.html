<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Map – Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/css/admin.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    #live-map { width:100%; height:calc(100vh - 160px); border-radius:14px; }
    .map-legend {
      position:absolute; bottom:40px; left:20px; z-index:1000;
      background:#fff; border-radius:12px; padding:14px 16px;
      box-shadow:0 4px 20px rgba(0,0,0,.15); font-size:.82rem;
    }
    .legend-item { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .legend-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; }
    .map-controls {
      display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center;
    }
    .control-btn {
      padding:8px 16px; border-radius:8px; border:1.5px solid #eee;
      background:#fff; cursor:pointer; font-family:'DM Sans',sans-serif;
      font-size:.85rem; font-weight:600; transition:.15s;
    }
    .control-btn.active { background:#e53935; color:#fff; border-color:#e53935; }
    .control-btn:hover:not(.active) { border-color:#e53935; color:#e53935; }
    .map-wrap { position:relative; }
  </style>
</head>
<body class="admin-body">

<nav class="admin-nav">
  <a class="nav-brand" href="/admin">Quick<span>Bite</span> Admin</a>
  <div class="nav-links">
    <a href="/admin">Dashboard</a>
    <a href="/admin/orders">Orders</a>
    <a href="/admin/delivery-partners">Partners</a>
    <a href="/admin/map" class="active">Live Map</a>
    <form method="post" action="/logout" style="display:inline">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}"/>
      <button type="submit" class="btn-logout">Sign Out</button>
    </form>
  </div>
</nav>

<main class="admin-main">
  <h1 class="admin-title">🗺 Live Delivery Map</h1>

  <div class="map-controls">
    <button class="control-btn active" onclick="filterMap('all',this)">All</button>
    <button class="control-btn" onclick="filterMap('partners',this)">🛵 Partners</button>
    <button class="control-btn" onclick="filterMap('orders',this)">📦 Active Orders</button>
    <button class="control-btn" onclick="refreshMap()" style="margin-left:auto;">🔄 Refresh</button>
    <span id="last-updated" style="font-size:.78rem;color:#aaa;"></span>
  </div>

  <div class="map-wrap">
    <div id="live-map"></div>
    <div class="map-legend">
      <div style="font-weight:700;margin-bottom:8px;font-size:.85rem;">Legend</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1565c0;"></div>Delivery Partner</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4caf50;"></div>Available Partner</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e53935;"></div>Customer Location</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff9800;border:2px dashed #e65100;"></div>Active Delivery</div>
    </div>
  </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script th:inline="javascript">
const BENGALURU = [12.9716, 77.5946];
const map = L.map('live-map').setView(BENGALURU, 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom:18
}).addTo(map);

let partnerMarkers = [];
let orderMarkers   = [];
let routeLines     = [];
let currentFilter  = 'all';

function makeIcon(emoji, color, size=32) {
  return L.divIcon({
    html: `<div style="width:${size}px;height:${size}px;border-radius:50%;
      background:${color};border:3px solid #fff;
      box-shadow:0 3px 10px rgba(0,0,0,.25);
      display:flex;align-items:center;justify-content:center;
      font-size:${size*0.45}px;">${emoji}</div>`,
    iconSize:[size,size], iconAnchor:[size/2,size/2], className:''
  });
}

async function loadMap() {
  clearMarkers();
  const [partnersRes, ordersRes] = await Promise.all([
    fetch('/admin/delivery-partners'),
    fetch('/admin/orders').catch(()=>({json:()=>[]}))
  ]);
  const partners = await partnersRes.json();
  let activeOrders = [];
  try {
    const allOrdersRes = await fetch('/admin/orders');
  } catch(e){}

  // Plot partners
  if (currentFilter !== 'orders') {
    partners.forEach(p => {
      if (!p.currentLat || !p.currentLng) return;
      const color  = p.isAvailable ? '#4caf50' : '#1565c0';
      const emoji  = '🛵';
      const marker = L.marker( [p.currentLat, p.currentLng], { icon: makeIcon(emoji, color) })
        .addTo(map)
        .bindPopup(`<b>${p.name}</b><br>
          📞 ${p.phone || '—'}<br>
          🚗 ${p.vehicleType || '—'}<br>
          ${p.isAvailable ? '🟢 Available' : '🔴 On delivery'}`);
      partnerMarkers.push(marker);
    });
  }

  // Plot active order delivery locations
  if (currentFilter !== 'partners') {
    // Fetch via admin orders endpoint — use all orders
    const adminOrdersRes = await fetch('/admin/orders');
  }

  document.getElementById('last-updated').textContent =
    'Updated: ' + new Date().toLocaleTimeString('en-IN');
}

function clearMarkers() {
  [...partnerMarkers, ...orderMarkers, ...routeLines].forEach(m => map.removeLayer(m));
  partnerMarkers = []; orderMarkers = []; routeLines = [];
}

function filterMap(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadMap();
}

function refreshMap() { loadMap(); }

// ── Also plot order pins from Thymeleaf-rendered data ────────
(function plotOrdersFromPage() {
  const ordersData = /*[[${orders}]]*/ [];
  // ordersData will be an empty array in JS context; we use the embedded data below
})();

// Embed order data from server
const ORDER_DATA = [
  /*[# th:each="o : ${orders}" ]*/
  /*[# th:if="${o != null and o.deliveryLat != null}" ]*/
  {
    id:   /*[[${o.id}]]*/ 0,
    lat:  /*[[${o.deliveryLat}]]*/ 0,
    lng:  /*[[${o.deliveryLng}]]*/ 0,
    addr: /*[[${o.deliveryAddress}]]*/ '',
    status: /*[[${o.status}]]*/ '',
    customer: /*[[${o.user != null ? o.user.name : 'Unknown'}]]*/ '',
    phone:    /*[[${o.user != null ? o.user.phone : 'N/A'}]]*/ '',
    partner:  /*[[${o.deliveryPartnerId}]]*/ null
  },
  /*[/]*/
  /*[/]*/
];

const PARTNER_DATA = [
	  /*[# th:each="p : ${partners}" ]*/
	  /*[# th:if="${p != null and p.currentLat != null}" ]*/
	  {
	    id:   /*[[${p.id}]]*/ 0,
	    name: /*[[${p.name}]]*/ '',
	    phone:/*[[${p.phone}]]*/ '',
	    vehicle: /*[[${p.vehicleType}]]*/ '',
	    lat:  /*[[${p.currentLat}]]*/ 0,
	    lng:  /*[[${p.currentLng}]]*/ 0,
	    avail:/*[[${p.isAvailable}]]*/ true
	  },
	  /*[/]*/
	  /*[/]*/
	];

function plotAll() {
	  clearMarkers();

	  // Orders
	  if (currentFilter !== 'partners') {
	    ORDER_DATA.forEach(o => {
	      // FIX: Use o.lat and o.lng to match ORDER_DATA object
	      if (!o.lat || !o.lng) return;

	      const color = o.status === 'OUT_FOR_DELIVERY' ? '#ff9800' : '#e53935';

	      const m = L.marker([o.lat, o.lng], {
	        icon: makeIcon('🏠', color)
	      }).addTo(map)
	        .bindPopup(`<b>Order #${o.id}</b><br>
	          👤 ${o.customer || 'Unknown'}<br>
	          📞 ${o.phone || ''}<br>
	          📍 ${o.addr || ''}<br>
	          📦 ${o.status}`)
	        .bindTooltip(`Order #${o.id}`, { permanent: true, direction: 'bottom', offset: [0, 10] });

	      orderMarkers.push(m);
	    });
	  }

	  // Partners
	  if (currentFilter !== 'orders') {
	    PARTNER_DATA.forEach(p => {
	      // FIX: Use p.lat and p.lng to match PARTNER_DATA object
	      if (!p.lat || !p.lng) return;

	      const color = p.avail ? '#4caf50' : '#1565c0';

	      const m = L.marker([p.lat, p.lng], {
	        icon: makeIcon('🛵', color)
	      }).addTo(map)
	        .bindPopup(`<b>${p.name}</b><br>
	          📞 ${p.phone}<br>
	          🚗 ${p.vehicle}<br>
	          ${p.avail ? '🟢 Available' : '🔴 On delivery/Offline'}`)
	        .bindTooltip(p.name, { permanent: true, direction: 'bottom', offset: [0, 10] });

	      partnerMarkers.push(m);

	      const activeOrder = ORDER_DATA.find(o =>
	        o.partner == p.id &&
	        o.status === 'OUT_FOR_DELIVERY'
	      );

	      if (activeOrder) {
	        const line = L.polyline([
	          [Number(p.lat), Number(p.lng)], 
	          [Number(activeOrder.lat), Number(activeOrder.lng)]
	        ], {
	          color: '#ff7043',
	          weight: 3,
	          dashArray: '8 5',
	          opacity: 0.85
	        }).addTo(map);

	        routeLines.push(line);
	      }
	    });
	  }

	  document.getElementById('last-updated').textContent =
	    'Updated: ' + new Date().toLocaleTimeString('en-IN');
	}


plotAll();
// Auto-refresh every 30 seconds
setInterval(plotAll, 30000);
</script>
</body>
</html>
