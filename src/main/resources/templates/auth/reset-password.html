<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Set New Password – QuickBite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;
      justify-content:center;padding:40px 20px;
      background:radial-gradient(ellipse at 60% 40%,#e8f5e9,#e3f2fd 60%,#f3e5f5);}
    .card{background:#fff;border-radius:24px;padding:48px 40px;width:100%;max-width:440px;
      box-shadow:0 20px 60px rgba(0,0,0,.10);}
    .logo{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;
      color:#e53935;letter-spacing:-1px;margin-bottom:8px;}
    .logo span{color:#ff7043;}
    .step-badge{display:inline-block;background:#e8f5e9;color:#2e7d32;
      padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;
      margin-bottom:24px;}
    h2{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;
      color:#1a1a2e;margin-bottom:6px;}
    .email-tag{background:#f5f5f5;border-radius:8px;padding:5px 12px;
      font-size:.82rem;color:#666;margin-bottom:24px;display:inline-block;}
    .form-group{margin-bottom:18px;}
    label{display:block;font-weight:600;font-size:.82rem;color:#555;
      text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
    .pw-wrap{position:relative;}
    input[type=password],input[type=text]{width:100%;padding:13px 48px 13px 16px;
      border:2px solid #eee;border-radius:10px;
      font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:.18s;}
    input:focus{border-color:#2e7d32;}
    .eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;padding:5px;color:#bbb;
      display:flex;align-items:center;}
    .eye-btn:hover{color:#555;}

    /* Password strength */
    .pw-bar{height:3px;background:#f0f0f0;border-radius:2px;margin-top:6px;}
    .pw-bar-fill{height:100%;border-radius:2px;width:0;transition:width .3s,background .3s;}
    .pw-bar-label{font-size:.75rem;font-weight:700;margin-top:4px;min-height:15px;}
    .confirm-hint{font-size:.78rem;font-weight:600;margin-top:5px;min-height:15px;}

    /* Rules */
    .rules{margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:4px;}
    .rule{font-size:.78rem;color:#ccc;display:flex;align-items:center;gap:5px;}
    .rule-dot{width:7px;height:7px;border-radius:50%;background:#e8e8e8;
      flex-shrink:0;transition:.2s;}
    .rule.ok{color:#2e7d32;}
    .rule.ok .rule-dot{background:#4caf50;}
    .rule.fail{color:#c62828;}
    .rule.fail .rule-dot{background:#e53935;}

    .alert-danger{background:#ffebee;color:#c62828;border:1px solid #ffcdd2;
      padding:11px 14px;border-radius:10px;margin-bottom:18px;font-size:.88rem;}
    .btn{width:100%;padding:14px;margin-top:4px;
      background:linear-gradient(135deg,#2e7d32,#66bb6a);
      color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;
      font-weight:700;font-size:1rem;cursor:pointer;transition:.2s;}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(46,125,50,.3);}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
    .back-link{display:block;text-align:center;margin-top:20px;
      color:#aaa;font-size:.88rem;text-decoration:none;}
    .back-link:hover{color:#e53935;}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Quick<span>Bite</span> 🍔</div>
  <span class="step-badge">Step 2 of 2 — Set New Password</span>

  <h2>Create a new password</h2>
  <div class="email-tag">🔒 Resetting for: <strong th:text="${email}">you@example.com</strong></div>

  <div th:if="${error}" class="alert-danger" th:text="${error}"></div>

  <form method="post" action="/reset-password" id="resetForm">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}"/>
    <input type="hidden" name="token" th:value="${token}"/>

    <!-- New Password -->
    <div class="form-group">
      <label>New Password</label>
      <div class="pw-wrap">
        <input type="password" name="password" id="pwField"
               placeholder="Min 8 characters" oninput="checkPw()" required/>
        <button type="button" class="eye-btn" onclick="toggleShow('pwField','eye1')">
          <svg id="eye1" width="18" height="18" viewBox="0 0 20 20" fill="none">
            <path d="M2 10C2 10 5 4 10 4s8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.3"/>
            <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        </button>
      </div>
      <div class="pw-bar"><div class="pw-bar-fill" id="pwFill"></div></div>
      <div class="pw-bar-label" id="pwLabel"></div>
      <div class="rules">
        <div class="rule" id="rLen"><div class="rule-dot"></div>8–20 characters</div>
        <div class="rule" id="rUpper"><div class="rule-dot"></div>Uppercase (A–Z)</div>
        <div class="rule" id="rLower"><div class="rule-dot"></div>Lowercase (a–z)</div>
        <div class="rule" id="rSymbol"><div class="rule-dot"></div>Symbol (!@#…)</div>
      </div>
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
      <label>Confirm Password</label>
      <div class="pw-wrap">
        <input type="password" name="confirmPassword" id="confirmField"
               placeholder="Re-enter password" oninput="checkConfirm()" required/>
        <button type="button" class="eye-btn" onclick="toggleShow('confirmField','eye2')">
          <svg id="eye2" width="18" height="18" viewBox="0 0 20 20" fill="none">
            <path d="M2 10C2 10 5 4 10 4s8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.3"/>
            <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        </button>
      </div>
      <div class="confirm-hint" id="confirmHint"></div>
    </div>

    <button type="submit" class="btn" id="submitBtn" disabled>🔒 Set New Password</button>
  </form>

  <a href="/forgot-password" class="back-link">← Request a new link</a>
</div>

<script>
const rules = { len:false, upper:false, lower:false, symbol:false };

const EYE_OPEN = '<path d="M2 10C2 10 5 4 10 4s8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.3"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.3"/>';
const EYE_SHUT = '<line x1="3" y1="3" x2="17" y2="17" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M7 5.2A9.5 9.5 0 0 1 10 4.5c5 0 8 5.5 8 5.5a14 14 0 0 1-2.5 3.2" stroke="currentColor" stroke-width="1.3"/><path d="M5 7.2A10 10 0 0 0 2 10s3 5.5 8 5.5c1.7 0 3.2-.5 4.4-1.4" stroke="currentColor" stroke-width="1.3"/>';

function toggleShow(fId, iId) {
  const inp = document.getElementById(fId);
  const ico = document.getElementById(iId);
  const show = inp.type === 'text';
  inp.type = show ? 'password' : 'text';
  ico.innerHTML = show ? EYE_OPEN : EYE_SHUT;
}

function setRule(id, ok, typed) {
  const el = document.getElementById(id);
  el.classList.toggle('ok',   ok);
  el.classList.toggle('fail', !ok && typed);
}

function checkPw() {
  const v = document.getElementById('pwField').value;
  const t = v.length > 0;
  rules.len    = v.length >= 8 && v.length <= 20;
  rules.upper  = /[A-Z]/.test(v);
  rules.lower  = /[a-z]/.test(v);
  rules.symbol = /[!@#$%^&*()\-_=+\[\]{};:'",.<>/?`~\\|]/.test(v);
  setRule('rLen',    rules.len,    t);
  setRule('rUpper',  rules.upper,  t);
  setRule('rLower',  rules.lower,  t);
  setRule('rSymbol', rules.symbol, t);

  const score  = Object.values(rules).filter(Boolean).length;
  const pcts   = [0,25,50,75,100];
  const colors = ['','#e53935','#ff9800','#2196f3','#4caf50'];
  const labels = ['','Weak','Fair','Good','Strong'];
  document.getElementById('pwFill').style.width      = pcts[score]+'%';
  document.getElementById('pwFill').style.background = colors[score];
  document.getElementById('pwLabel').style.color     = colors[score];
  document.getElementById('pwLabel').textContent     = t ? labels[score] : '';
  checkConfirm();
}

function checkConfirm() {
  const pw = document.getElementById('pwField').value;
  const co = document.getElementById('confirmField').value;
  const h  = document.getElementById('confirmHint');
  const allRulesOk = Object.values(rules).every(Boolean);

  if (!co) { h.textContent = ''; document.getElementById('submitBtn').disabled = true; return; }
  if (pw === co && allRulesOk) {
    h.style.color = '#2e7d32'; h.textContent = '✓ Passwords match';
    document.getElementById('submitBtn').disabled = false;
  } else {
    h.style.color = '#c62828';
    h.textContent = pw !== co ? '✗ Passwords do not match' : '✗ Password does not meet requirements';
    document.getElementById('submitBtn').disabled = true;
  }
}

document.getElementById('resetForm').addEventListener('submit', function(e) {
  const pw = document.getElementById('pwField').value;
  const co = document.getElementById('confirmField').value;
  if (pw !== co || !Object.values(rules).every(Boolean)) {
    e.preventDefault();
    checkPw();
    return;
  }
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = 'Setting password…';
});
</script>
</body>
</html>
